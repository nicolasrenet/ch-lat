<!DOCTYPE html>
<html>
<head>
<!-- Load the Paper.js library -->
	<script type="text/javascript" src="static/paper.js"></script>
<!-- Define inlined JavaScript -->

	<script type="text/javascript" src="static/line_annotation.js"> </script>
</head>
<body>
	<div id="cnv" class="cnvbox">
		<canvas id="myCanvas" width="{{charter_size[0]}}px" height="{{charter_size[1]}}px"> </canvas>
	</div>

      	<script type="text/javascript">

	<!-- read from line_annotation.js -->

		const cnv = document.getElementById("myCanvas");
		var img_file = "static/{{charters[charter_id].filename}}"; 

	     	function exportData(){
			segdata =  cnv.exportMask();
			if (Object.keys(segdata).length === 0){
				console.log("exportData() - abort: empty segmentation data!")
				return
			}
			fetch("/export/{{charter_id}}", {
				method: "POST",
				headers: {"Content-Type":"application/json"},
				body: JSON.stringify( segdata )
			}).then( resp => { console.log(resp.json()) } )
		}

		function importData( dataType ){
			url = "/import/{{charter_id}}?" + new URLSearchParams({segtype: dataType}).toString()
			console.log("Importing seg data - " + url);
			fetch(url, { method: "GET" }
			).then( resp => { return resp.json() ; }
			).then( data => { cnv.importMask( data, dataType ); })
		}

		function eraseData(){
			cnv.eraseMask();
		}


        </script>

	<style>
		/* Prevents bug in hit event */
		.cnvbox {
			padding: 0px;
		}
		.box {
			display: flex;
			align-items:center;
		}
		.box > * {
			padding: 10px;
		}
		#charter-table {
			table-layout: fixed;
			display: table;
			flex: 2 1;
		}

		.table-header {
			display: table-header-group;
			font-weight: bold;
		}
		.table-header-cell{
			display: table-cell;
			text-align: center;
			border-bottom: 1px solid;
		}
		.table-body {
			display: table-row-group;
		}
		.table-row > * {
			border-bottom: 1px solid;
		}
		.table-row {
			display: table-row;
		}
		.table-cell {
			height: 25px;
			display: table-cell;
			padding-left: 20px;
			padding-right: 20px;
			text-align: center;
		}
		.filename-cell {
			height: 25px;
			text-align: left;
		}
		.filename-header-cell {
			width: 80%
		}
		#export-button {
			flex: 1; 
			height: 70px;
			font-size: 1.5rem;
			background-color: #a7c7e7;
		}
	</style>

	<script type='text/javascript'>
		<!--document.getElementById("check_gtdata_{{id}}").onclick=() => { document.getElementById("gt_data_{{id}}").submit();}-->
	</script>

	<div id="control-box" class="box">
		<div id="charter-table">
			<div class="table-header">
				<div class="table-header-cell filename-header-cell">Charter</div> 
				<div class="table-header-cell">GT Segt.</div> 
				<div class="table-header-cell">Pred Segt.</div> 
			</div>
			<div class="table-body">
				{% for id, ch in charters.items() %}
					
				<div class="table-row">
					<div class="filename-cell">
						{% if id != charter_id %}
						<a href="/{{id}}">{{loop.index}}. {{ch.filename}}</a>
						{% else %}
						{{loop.index}}. {{ch.filename}}
						{% endif %}
					</div>
					<div class="table-cell">
						{% if ch.hasGTData %} 
							<input class="tablechck" type="checkbox" id="check_gtdata_{{id}}" name="check_gtdata" value="false">
						{% endif %}
					</div>
					<div class="table-cell">
						{% if ch.hasPredData %} 
							<input class="tablechck" type="checkbox" id="check_preddata_{{id}}" name="check_preddata" value="false">
						{% endif %}
					</div>
				</div>
				{% endfor %}

			</div>
		</div>
		<button id="export-button" onClick="exportData()"> Export</button>
	</div>

	<script type="text/javascript">
		var gt_data_checks = document.getElementsByName("check_gtdata")
		var gt_data_status = false;
		var pred_data_checks = document.getElementsByName("check_preddata")
		var pred_data_status = false;

		for (elt of gt_data_checks){
			if (elt.id === "check_gtdata_{{charter_id}}"){
				elt.onclick = () => { 
					if (! gt_data_status){
						importData( 'gt' ) ;
						gt_data_status = true;
						check_preddata_elt = document.getElementById('check_preddata_{{charter_id}}');
						if (check_preddata_elt !== null){ console.log('Unchkecing check_preddata_{{charter_id}}'); check_preddata_elt.checked=false;}
						pred_data_status = false;
					} else {
						eraseData() ;
						gt_data_status = false;
					}
				}
				elt.value=false;
			} else {
				elt.disabled = true;
			}
		}
		for (elt of pred_data_checks){
			if (elt.id === "check_preddata_{{charter_id}}"){
				elt.onclick = () => { 
					if (! pred_data_status){
						eraseData();
						importData( 'pred' ) ;
						pred_data_status = true;
						check_gtdata_elt = document.getElementById('check_gtdata_{{charter_id}}');
						if (check_gtdata_elt !== null){ console.log('Unchecking check_gtdata_{{charter_id}}'); check_gtdata_elt.checked=false; }
						gt_data_status = false;
					} else {
						eraseData() ;
						pred_data_status = false;
					}
				}
				elt.value=false
			} else {
				elt.disabled = true;
			}
		}
		
	</script>

</body>

</html>
