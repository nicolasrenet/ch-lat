<!DOCTYPE html>
<html>
<head>
<!-- Load the Paper.js library -->
	<script type="text/javascript" src="static/paper.js"></script>
<!-- Define inlined JavaScript -->

	<script type="text/javascript" src="static/line_annotation.js"> </script>
</head>
<body>
	<div id="cnv">
	<canvas id="myCanvas" width="800px" height="600px">
	</canvas>
	</div>

      	<script type="text/javascript">

	<!-- read from line_annotation.js -->

		const cnv = document.getElementById("myCanvas");
		var img_file = "static/{{charters[charter_id].filename}}"; 

	     	function exportData(){
			var data =  cnv.exportMask();
			fetch("/export/{{charter_id}}", {
			method: "POST",
			headers: {"Content-Type":"application/json"},
			body: JSON.stringify( data )
			}).then( resp => { console.log(resp.json()) } )
		}

        </script>

	<div id="charters">
	<ul>
		{% for id, ch in charters.items() %}
		<li><a href="/{{id}}">{{loop.index}}. {{ch.filename}}</a></li>
		{% endfor %}
	</ul>
	</div>
	<div>
		<button onClick="exportData()"> Export</button>

	</div>
</body>

</html>
